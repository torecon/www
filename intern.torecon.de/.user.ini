; PHP-Einstellungen für PHP-FPM (Plesk / moderner Hosting-Stack)
; Diese Datei wird von PHP-FPM gelesen – kein Apache mod_php nötig.
; Nach Änderungen: PHP-FPM neu starten oder ~5 Minuten warten (TTL).
max_execution_time = 120
max_input_time = 120
memory_limit = 128M
post_max_size = 8M
upload_max_filesize = 8M
