<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="torecon – Tägliche Finanzmarkt-Trends und Entwicklungen für Kreditinstitute.">
  <title>Finanztrends – torecon</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script>window.TORECON_ROOT = './'; window.TORECON_PAGE = 'news';</script>

<div id="site-nav"></div>

<div class="page-header">
  <div class="container">
    <div class="section-eyebrow" data-i18n="news_page_eye">Finanzmarkt</div>
    <h1 data-i18n="news_page_h1">Finanzmarkt-Trends</h1>
    <p data-i18n="news_page_sub">Tägliche Einblicke in Entwicklungen, die Kreditinstitute und Finanzinstitutionen betreffen.</p>
  </div>
</div>

<section>
  <div class="container">
    <div class="news-grid" id="news-container">
      <!-- rendered by news.js -->
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="./js/i18n.js"></script>
<script src="./js/news.js"></script>
<script src="./js/layout.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => renderNews('news-container'));
</script>
</body>
</html>
