<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eLadung – Downloads</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: rgba(255,255,255,0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .app-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(145deg, #0071E3, #005bb5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    header span.sub {
      font-size: 13px;
      color: #6e6e73;
      margin-left: 4px;
    }

    main {
      width: 100%;
      max-width: 820px;
      padding: 48px 24px 80px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1d1d1f;
      margin-bottom: 8px;
    }

    .page-sub {
      font-size: 16px;
      color: #6e6e73;
      margin-bottom: 40px;
    }

    #releases-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .release-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px 24px;
      align-items: center;
      transition: box-shadow 0.2s;
    }

    .release-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }

    .release-card.latest {
      border: 1.5px solid #0071E3;
    }

    .release-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .version-badge {
      font-size: 17px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .latest-badge {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: #0071E3;
      border-radius: 20px;
      padding: 2px 10px;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .release-date {
      font-size: 13px;
      color: #6e6e73;
    }

    .release-notes {
      font-size: 14px;
      color: #3a3a3c;
      line-height: 1.6;
    }

    .release-notes ul {
      margin: 6px 0 0 18px;
      padding: 0;
    }

    .release-notes li {
      margin-bottom: 3px;
    }

    .release-notes p {
      margin: 4px 0 0;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #0071E3;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 980px;
      padding: 10px 22px;
      white-space: nowrap;
      transition: background 0.15s;
      flex-shrink: 0;
      align-self: center;
    }

    .download-btn:hover { background: #005bb5; }

    .download-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    .loading {
      text-align: center;
      color: #6e6e73;
      font-size: 15px;
      padding: 60px 0;
    }

    .error {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 12px;
      padding: 20px 24px;
      color: #c62828;
      font-size: 14px;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 12px;
      color: #b0b0b5;
      text-align: center;
    }

    footer a { color: #6e6e73; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 560px) {
      .release-card {
        grid-template-columns: 1fr;
      }
      .download-btn {
        justify-content: center;
      }
      header { padding: 14px 20px; }
      main { padding: 32px 16px 60px; }
    }
  </style>
</head>
<body>

<header>
  <div class="app-icon">eL</div>
  <div>
    <h1>eLadung <span class="sub">Downloads</span></h1>
  </div>
</header>

<main>
  <h2 class="page-title">Alle Versionen</h2>
  <p class="page-sub">Verfügbare Releases für macOS – sortiert nach Release-Datum.</p>

  <div id="releases-list">
    <div class="loading">Lade Releases…</div>
  </div>
</main>

<footer>
  <a href="https://www.torecon.de">torecon.de</a> &nbsp;·&nbsp; &copy; <span id="year"></span> Thomas Reinke
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const RELEASES_URL = 'https://downloads.torecon.de/eladung/releases.json';
  const container = document.getElementById('releases-list');

  function formatDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('de-DE', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function downloadIcon() {
    return `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2v8M5 7l3 3 3-3M3 13h10"/>
    </svg>`;
  }

  // Render simple markdown: bullet lists and paragraphs
  function renderMarkdown(text) {
    const lines = text.trim().split('\n');
    let html = '';
    let inList = false;

    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('- ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${trimmed.slice(2)}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (trimmed) html += `<p>${trimmed}</p>`;
      }
    }
    if (inList) html += '</ul>';
    return html;
  }

  async function fetchNotes(url) {
    try {
      const res = await fetch(url);
      return res.ok ? renderMarkdown(await res.text()) : '';
    } catch {
      return '';
    }
  }

  async function loadReleases() {
    try {
      const res = await fetch(RELEASES_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const releases = await res.json();

      releases.sort((a, b) => new Date(b.release_date) - new Date(a.release_date));

      if (releases.length === 0) {
        container.innerHTML = '<p class="error">Keine Releases gefunden.</p>';
        return;
      }

      // Fetch all notes in parallel
      const notes = await Promise.all(releases.map(r => fetchNotes(r.release_notes_url)));

      container.innerHTML = releases.map((r, i) => `
        <div class="release-card${i === 0 ? ' latest' : ''}">
          <div>
            <div class="release-meta">
              <span class="version-badge">Version ${r.version}</span>
              ${i === 0 ? '<span class="latest-badge">Aktuell</span>' : ''}
              <span class="release-date">${formatDate(r.release_date)}</span>
            </div>
            <div class="release-notes">${notes[i]}</div>
          </div>
          <a class="download-btn" href="${r.download_url}" download>
            ${downloadIcon()} Herunterladen
          </a>
        </div>
      `).join('');

    } catch (err) {
      container.innerHTML = `<div class="error">Releases konnten nicht geladen werden: ${err.message}</div>`;
    }
  }

  loadReleases();
</script>

</body>
</html>
