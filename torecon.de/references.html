<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Referenzen von torecon – Thomas Reinke. Langjährige Erfahrung in der Beratung von Genossenschaftsbanken, Kreditinstituten und Bildungseinrichtungen.">
  <meta name="author" content="Thomas Reinke">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.torecon.de/references.html">
  <title>Referenzen – torecon | Thomas Reinke</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.torecon.de/references.html">
  <meta property="og:title" content="Referenzen – torecon | Thomas Reinke">
  <meta property="og:description" content="Referenzen aus über 25 Jahren Beratungserfahrung – Genossenschaftsbanken, Kreditinstitute und mehr.">
  <meta property="og:image" content="https://www.torecon.de/img/thomas-reinke.jpeg">
  <meta property="og:locale" content="de_DE">
  <meta property="og:site_name" content="torecon">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<script>window.TORECON_ROOT = './'; window.TORECON_PAGE = 'references';</script>

<div id="site-nav"></div>

<div class="page-header">
  <div class="container">
    <div class="section-eyebrow" data-i18n="ref_eye">Referenzen</div>
    <h1 data-i18n="ref_h1">Vertrauen durch Erfahrung</h1>
    <p data-i18n="ref_sub">Ausgewählte Mandanten und Projekte aus über 25 Jahren Beratungstätigkeit.</p>
  </div>
</div>

<section class="bg-alt">
  <div class="container">
    <div class="logo-grid" id="logo-grid">
      <!-- rendered by JS -->
    </div>
  </div>
</section>

<section class="cta-section">
  <h2 data-i18n="cta_h2">Gemeinsam erfolgreich</h2>
  <p data-i18n="cta_p">Nehmen Sie Kontakt auf und erfahren Sie, wie torecon Ihr Institut stärken kann.</p>
  <div class="cta-actions">
    <a href="./contact.html" class="btn btn-primary" data-i18n="cta_btn1">Jetzt Kontakt aufnehmen</a>
  </div>
</section>

<div id="site-footer"></div>

<script src="./js/i18n.js"></script>
<script src="./js/cookie.js"></script>
<script src="./js/layout.js"></script>
<script src="./js/ai-ticker.js"></script>
<script>
async function renderLogos() {
  const grid = document.getElementById('logo-grid');
  let logos = [];
  try {
    const res = await fetch('./data/logos.json?v=' + Date.now());
    logos = await res.json();
  } catch(e) {
    return;
  }
  if (!logos.length) return;

  grid.innerHTML = logos.map(function(l) {
    return '<div class="logo-tile">' +
      '<img src="./img/logos/' + l.file + '" alt="' + l.alt + '" onerror="logoError(this)">' +
      '</div>';
  }).join('');
}

function logoError(img) {
  var file = img.src.split('/').pop();
  img.style.display = 'none';
  var span = document.createElement('span');
  span.className = 'logo-missing';
  span.textContent = file;
  img.parentNode.appendChild(span);
}

document.addEventListener('DOMContentLoaded', renderLogos);
</script>
</body>
</html>
