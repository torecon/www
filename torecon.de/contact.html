<script>
async function handleSubmit(e) {
  e.preventDefault();
  const btn      = document.getElementById('submit-btn');
  const feedback = document.getElementById('form-feedback');
  const lang     = currentLang || 'de';

  const name    = document.getElementById('cf-name').value.trim();
  const email   = document.getElementById('cf-email').value.trim();
  const subject = document.getElementById('cf-subject').value.trim();
  const message = document.getElementById('cf-message').value.trim();

  btn.disabled = true;
  btn.textContent = lang === 'de' ? 'Wird gesendet …' : 'Sending …';
  feedback.style.display = 'none';

  const payload = {
    access_key:  'c18222aa-d131-4135-9c9a-a1e84f4fb66c',
    from_name:   'torecon Kontaktformular',
    subject:     subject ? 'torecon Anfrage: ' + subject : 'Neue Kontaktanfrage über torecon.de',
    name:        name,
    email:       email,
    message:     message,
    replyto:     email,
    cc:          email   // Kopie an Absender
  };

  try {
    const res  = await fetch('https://api.web3forms.com/submit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await res.json();
    console.log('Web3Forms response:', data);

    if (data.success) {
      feedback.style.cssText = 'display:block;background:rgba(52,199,89,0.1);color:#1a7a3a;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:15px;';
      feedback.textContent = lang === 'de'
        ? 'Vielen Dank! Ihre Nachricht wurde gesendet. Wir melden uns zeitnah.'
        : 'Thank you! Your message has been sent. We will get back to you soon.';
      e.target.reset();
    } else {
      feedback.style.cssText = 'display:block;background:rgba(255,59,48,0.1);color:#c0392b;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:15px;';
      feedback.textContent = 'Fehler: ' + (data.message || 'Unbekannter Fehler');
    }
  } catch (err) {
    console.error('Formular-Fehler:', err);
    feedback.style.cssText = 'display:block;background:rgba(255,59,48,0.1);color:#c0392b;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:15px;';
    feedback.textContent = lang === 'de'
      ? 'Verbindungsfehler. Bitte direkt an info@torecon.de schreiben.'
      : 'Connection error. Please write directly to info@torecon.de.';
  } finally {
    btn.disabled = false;
    btn.textContent = lang === 'de' ? 'Nachricht senden' : 'Send message';
  }
}
</script>
